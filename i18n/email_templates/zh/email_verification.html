<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱验证 — {{.SystemName}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 32px 24px; text-align: center; }
    .header h1 { color: #fff; font-size: 22px; margin: 0; font-weight: 600; }
    .body { padding: 32px 24px; }
    .body p { color: #333; font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
    .code-box { background: #f0f0f0; border-radius: 8px; padding: 16px 24px; text-align: center; margin: 24px 0; }
    .code { font-size: 32px; font-weight: 700; letter-spacing: 4px; color: #667eea; font-family: 'Courier New', monospace; }
    .footer { border-top: 1px solid #eee; padding: 16px 24px; text-align: center; }
    .footer p { color: #999; font-size: 12px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{.SystemName}}</h1>
    </div>
    <div class="body">
      <p>您好！</p>
      <p>您正在对 <strong>{{.SystemName}}</strong> 账号进行邮箱验证。</p>
      <div class="code-box">
        <p style="font-size:13px;color:#666;margin:0 0 8px;">您的验证码：</p>
        <div class="code">{{.Code}}</div>
      </div>
      <p>验证码 <strong>{{.ValidMinutes}} 分钟</strong>内有效。如非本人操作，请忽略此邮件。</p>
      <p style="color:#999;font-size:13px;">此为系统自动发送邮件，请勿回复。</p>
    </div>
    <div class="footer">
      <p>&copy; {{.Year}} {{.SystemName}}</p>
    </div>
  </div>
</body>
</html>
