<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码重置 — {{.SystemName}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 32px 24px; text-align: center; }
    .header h1 { color: #fff; font-size: 22px; margin: 0; font-weight: 600; }
    .body { padding: 32px 24px; }
    .body p { color: #333; font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
    .btn { display: inline-block; background: #667eea; color: #fff; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; margin: 16px 0; }
    .btn:hover { background: #5a6fd6; }
    .link-box { background: #f0f0f0; border-radius: 8px; padding: 12px 16px; margin: 16px 0; word-break: break-all; font-size: 13px; color: #666; }
    .footer { border-top: 1px solid #eee; padding: 16px 24px; text-align: center; }
    .footer p { color: #999; font-size: 12px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{.SystemName}}</h1>
    </div>
    <div class="body">
      <p>您好！</p>
      <p>您正在对 <strong>{{.SystemName}}</strong> 账号进行密码重置。</p>
      <div style="text-align:center;">
        <a href="{{.Link}}" class="btn">重置密码</a>
      </div>
      <p>如果按钮无法点击，请将下方链接复制到浏览器中打开：</p>
      <div class="link-box">{{.Link}}</div>
      <p>重置链接 <strong>{{.ValidMinutes}} 分钟</strong>内有效。如非本人操作，请忽略此邮件。</p>
      <p style="color:#999;font-size:13px;">此为系统自动发送邮件，请勿回复。</p>
    </div>
    <div class="footer">
      <p>&copy; {{.Year}} {{.SystemName}}</p>
    </div>
  </div>
</body>
</html>
