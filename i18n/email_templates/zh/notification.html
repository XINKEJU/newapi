<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — {{.SystemName}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 520px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 24px 24px; text-align: center; }
    .header h1 { color: #fff; font-size: 20px; margin: 0; font-weight: 600; }
    .body { padding: 28px 24px; }
    .body .content { color: #333; font-size: 15px; line-height: 1.7; }
    .footer { border-top: 1px solid #eee; padding: 16px 24px; text-align: center; }
    .footer p { color: #999; font-size: 12px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{.SystemName}}</h1>
    </div>
    <div class="body">
      <h2 style="font-size:18px;color:#333;margin:0 0 16px;">{{.Title}}</h2>
      <div class="content">{{.Content}}</div>
      <p style="color:#999;font-size:13px;margin-top:24px;">此为系统自动发送邮件，请勿回复。</p>
    </div>
    <div class="footer">
      <p>&copy; {{.Year}} {{.SystemName}}</p>
    </div>
  </div>
</body>
</html>
