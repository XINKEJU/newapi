# New-API 生产环境 Docker Compose 配置
# 域名：umniai.ru (IP: 170.168.89.127)
# 从 XINKEJU/newapi 源码构建

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    volumes:
      - ./web/default/dist:/data/web/default/dist
      - ./web/classic/dist:/data/web/classic/dist
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://newapi:TLDzy20250610..@postgres:5432/newapi?sslmode=disable
      - REDIS_CONN_STRING=redis://:ff783f203d74570ec93edb4617b90c51189626407bb5ce75@redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=umniai-prod
      - TRUSTED_REDIRECT_DOMAINS=umniai.ru
      - SESSION_SECRET=d2555b4adc2d44d96a49aa0da5ab1d9bdbb5a86b1ead4b3d5e0809085fdda7e3
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: umniai-nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - new-api
    networks:
      - new-api-network

  certbot:
    image: certbot/certbot:latest
    container_name: umniai-certbot
    profiles: ["certbot"]
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    command: ["redis-server", "--requirepass", "ff783f203d74570ec93edb4617b90c51189626407bb5ce75", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - new-api-network

  postgres:
    image: postgres:16
    container_name: new-api-postgres
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: TLDzy20250610..
      POSTGRES_DB: newapi
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

volumes:
  pg_data:
  certbot-www:
  certbot-certs:

networks:
  new-api-network:
    driver: bridge
