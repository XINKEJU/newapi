# New-API 生产环境 Docker Compose 配置
# 域名：umniai.ru (IP: 170.168.89.127)
# 从 XINKEJU/newapi 源码构建
#
# 所有敏感配置通过 .env.prod 文件注入（不要提交到 Git）。
# 参考 .env.prod.example 获取所需变量列表。

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    volumes:
      - ./web/default/dist:/data/web/default/dist
      - ./web/classic/dist:/data/web/classic/dist
      - ./data:/data
      - ./logs:/app/logs
    env_file:
      - .env.prod
    environment:
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=umniai-prod
      - TRUSTED_REDIRECT_DOMAINS=umniai.ru
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  nginx:
    image: nginx:1.27-alpine
    container_name: umniai-nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      new-api:
        condition: service_healthy
    networks:
      - new-api-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  certbot:
    image: certbot/certbot:latest
    container_name: umniai-certbot
    profiles: ["certbot"]
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\" --maxmemory 256mb --maxmemory-policy allkeys-lru"]
    env_file:
      - .env.prod
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  postgres:
    image: postgres:16
    container_name: new-api-postgres
    restart: always
    env_file:
      - .env.prod
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newapi -d newapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

volumes:
  pg_data:
  certbot-www:
  certbot-certs:

networks:
  new-api-network:
    driver: bridge
